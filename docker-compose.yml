services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gads_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/gads_dashboard
      NODE_ENV: production
      PORT: "3001"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
